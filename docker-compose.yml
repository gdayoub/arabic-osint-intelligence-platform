services:
  postgres:
    image: postgres:16
    container_name: arabic_osint_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arabic_osint}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql:ro

  app:
    build: .
    container_name: arabic_osint_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PYTHONPATH: /app
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

volumes:
  postgres_data:
